apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rai-governance.fullname" . }}
  labels:
    {{- include "rai-governance.labels" . | nindent 4 }}
data:
  RAI_AUTH_ENABLED: {{ .Values.config.authEnabled | quote }}
  RAI_ALERT_THRESHOLD: {{ .Values.config.alertThreshold | quote }}
  RAI_MONTHLY_BUDGET_USD: {{ .Values.config.monthlyBudgetUsd | quote }}
  RAI_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  RAI_LOG_JSON: {{ .Values.config.logJson | quote }}
  {{- if .Values.config.databaseUrl }}
  RAI_DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.config.redisUrl }}
  RAI_REDIS_URL: {{ .Values.config.redisUrl | quote }}
  {{- end }}
  {{- if .Values.config.otelEndpoint }}
  RAI_OTEL_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
  {{- end }}
  {{- if .Values.oidc.enabled }}
  RAI_OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  RAI_OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  RAI_OIDC_REDIRECT_URI: {{ .Values.oidc.redirectUri | quote }}
  RAI_OIDC_SCOPES: {{ .Values.oidc.scopes | quote }}
  {{- end }}
  {{- if .Values.persistence.enabled }}
  RAI_DB_PATH: {{ .Values.persistence.mountPath }}/data.db
  {{- end }}
