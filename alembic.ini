[alembic]
script_location = migrations
prepend_sys_path = .

# DB URL is read from environment in migrations/env.py.
# Set RAI_DB_URL or RAI_DB_PATH before running migrations.
# Example:
#   RAI_DB_PATH=/var/lib/rai/governance.db alembic upgrade head
#   RAI_DB_URL=postgresql://user:pass@host/db alembic upgrade head
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
