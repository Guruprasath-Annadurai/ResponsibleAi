<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="ResponsibleAI logo icon">

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="44" ry="44" fill="#1a1a1a"/>

  <!-- Stem: left vertical bar -->
  <rect x="28" y="26" width="30" height="148" fill="#ffffff"/>

  <!-- Bowl: D-crescent with circular hole
       Outer arc: center=(58,73), r=47 → top=(58,26) bottom=(58,120)
       Inner arc: center=(58,73), r=20 → top=(58,53) bottom=(58,93)
       fill-rule=evenodd punches the hole out -->
  <path fill-rule="evenodd" fill="#ffffff" d="
    M 58,26 A 47,47,0,0,1,58,120 L 58,26 Z
    M 58,53 A 20,20,0,0,1,58,93  L 58,53 Z
  "/>

  <!-- Leg: diagonal slash with checkmark notch at top
       The path dips to (68,143) then back up, leaving a dark triangular
       notch between the bowl-bottom and leg-top — reads as the check/verify mark.
       Visible notch triangle: (58,120)-(68,143)-(78,120) -->
  <polygon fill="#ffffff" points="44,120 68,143 78,120 160,174 124,174"/>

</svg>
