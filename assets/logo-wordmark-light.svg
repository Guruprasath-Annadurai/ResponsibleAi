    <rect x="28" y="26" width="30" height="148" fill="#1a1a1a"/>
    <path fill-rule="evenodd" fill="#1a1a1a" d="M 58,26 A 47,47,0,0,1,58,120 L 58,26 Z M 58,53 A 20,20,0,0,1,58,93 L 58,53 Z"/>
