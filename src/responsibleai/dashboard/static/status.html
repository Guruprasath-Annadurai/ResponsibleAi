<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResponsibleAI — Platform Status</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 640px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    background: #fafafa;
    color: #1a1a1a;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0f0f10; color: #e8e8e8; }
    .card { background: #1a1a1c !important; border-color: #2a2a2c !important; }
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
  .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
  .card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .status-row { display: flex; align-items: center; justify-content: space-between; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 0.5rem; }
  .dot.operational { background: #22c55e; }
  .dot.degraded { background: #f59e0b; }
  .dot.down { background: #ef4444; }
  .dot.unknown { background: #9ca3af; }
  .label { font-weight: 600; }
  .meta { font-size: 0.85rem; color: #888; margin-top: 0.5rem; }
  .error { color: #ef4444; font-size: 0.9rem; }
  footer { margin-top: 2rem; font-size: 0.8rem; color: #999; }
  footer a { color: inherit; }
</style>
</head>
<body>
  <h1>ResponsibleAI Platform Status</h1>
  <p class="subtitle">Polls <code>/api/support/status</code> directly from this deployment — self-hosted stopgap, not a substitute for a public multi-region status page.</p>

  <div class="card">
    <div class="status-row">
      <span><span class="dot unknown" id="dot"></span><span class="label" id="status-text">Checking…</span></span>
      <span id="version"></span>
    </div>
    <div class="meta" id="uptime"></div>
    <div class="error" id="error"></div>
  </div>

  <footer>
    Last checked: <span id="checked-at">—</span> · Auto-refreshes every 30s.
    See <a href="https://github.com/Guruprasath-Annadurai/ResponsibleAi/blob/main/SLA.md" target="_blank">SLA</a> for uptime commitments.
  </footer>

  <script>
    async function poll() {
      const dot = document.getElementById("dot");
      const statusText = document.getElementById("status-text");
      const version = document.getElementById("version");
      const uptime = document.getElementById("uptime");
      const errorEl = document.getElementById("error");
      const checkedAt = document.getElementById("checked-at");

      try {
        const res = await fetch("/api/support/status", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const status = data.status || "unknown";
        dot.className = "dot " + status;
        statusText.textContent = status === "operational" ? "All systems operational" : `Status: ${status}`;
        version.textContent = data.version ? `v${data.version}` : "";
        const hours = (data.uptime_seconds / 3600).toFixed(1);
        uptime.textContent = `Uptime: ${hours}h since last restart`;
        errorEl.textContent = "";
      } catch (err) {
        dot.className = "dot down";
        statusText.textContent = "Unable to reach platform";
        errorEl.textContent = String(err);
      }
      checkedAt.textContent = new Date().toLocaleTimeString();
    }

    poll();
    setInterval(poll, 30000);
  </script>
</body>
</html>
