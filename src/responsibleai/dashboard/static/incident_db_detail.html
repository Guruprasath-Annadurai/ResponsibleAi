<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Incident Detail — ResponsibleAI AI Incident Database</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa; --fg: #1a1a1a; --muted: #666;
    --card-bg: #ffffff; --card-border: #e5e5e5;
    --accent: #2563eb; --green: #16a34a; --amber: #d97706; --red: #dc2626; --code-bg: #f1f1f1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b0b0c; --fg: #e8e8e8; --muted: #999;
      --card-bg: #17181a; --card-border: #2a2a2c; --code-bg: #232427;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 5rem;
    background: var(--bg); color: var(--fg); line-height: 1.6;
  }
  .meta-links { font-size: 0.88rem; margin-bottom: 1.5rem; }
  .meta-links a { color: var(--accent); text-decoration: none; }

  .panel {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 1.75rem;
  }
  .id-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .rai-id { font-family: monospace; font-size: 0.85rem; color: var(--muted); }
  .sev-pill {
    display: inline-block; font-size: 0.75rem; font-weight: 700; border-radius: 999px;
    padding: 0.18rem 0.65rem; text-transform: uppercase; letter-spacing: 0.02em;
  }
  .sev-pill.critical { background: rgba(220,38,38,0.15); color: var(--red); }
  .sev-pill.high { background: rgba(217,119,6,0.15); color: var(--amber); }
  .sev-pill.medium { background: rgba(37,99,235,0.12); color: var(--accent); }
  .sev-pill.low { background: var(--code-bg); color: var(--muted); }
  .status-pill { font-size: 0.75rem; color: var(--muted); border: 1px solid var(--card-border); border-radius: 999px; padding: 0.18rem 0.6rem; }
  .type-pill { font-size: 0.75rem; color: var(--muted); }

  h1 { font-size: 1.4rem; margin: 0.75rem 0 1rem; letter-spacing: -0.01em; }
  .model-line { color: var(--muted); font-size: 0.92rem; margin-bottom: 1.25rem; }
  .desc { font-size: 0.95rem; white-space: pre-wrap; margin-bottom: 1.5rem; }

  h2 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 1.5rem 0 0.6rem; }
  ul.evidence { margin: 0; padding-left: 1.2rem; font-size: 0.88rem; }
  ul.evidence li { margin-bottom: 0.3rem; }
  pre.repro {
    background: var(--code-bg); border-radius: 8px; padding: 1rem; font-size: 0.82rem;
    white-space: pre-wrap; word-break: break-word;
  }
  .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .tag { font-size: 0.76rem; background: var(--code-bg); border-radius: 999px; padding: 0.15rem 0.6rem; color: var(--muted); }

  .hash-box {
    font-family: monospace; font-size: 0.76rem; color: var(--muted);
    background: var(--code-bg); padding: 0.75rem 1rem; border-radius: 8px;
    word-break: break-all; margin-top: 1.5rem;
  }
  .empty, .error { padding: 3rem 1.5rem; text-align: center; color: var(--muted); }
  .error { color: var(--red); }
</style>
</head>
<body>

<div class="meta-links"><a href="/incident-db">&larr; Back to the database</a></div>

<div id="panel"><div class="empty">Loading…</div></div>

<script>
(function () {
  const panel = document.getElementById("panel");
  const publicId = window.location.pathname.split("/").filter(Boolean).pop();

  function sevClass(sev) { return "sev-pill " + (sev || "low"); }

  function render(d) {
    const evidence = d.evidence || {};
    const urls = evidence.urls || [];
    const repro = evidence.reproduction_steps;
    const tags = (d.tags || []).map(function (t) { return '<span class="tag">' + t + "</span>"; }).join("");
    const evidenceHtml = urls.length
      ? '<h2>Evidence</h2><ul class="evidence">' + urls.map(function (u) {
          return '<li><a href="' + u + '" target="_blank" rel="noopener">' + u + "</a></li>";
        }).join("") + "</ul>"
      : "";
    const reproHtml = repro ? '<h2>Reproduction steps</h2><pre class="repro">' + repro + "</pre>" : "";
    const tagsHtml = tags ? '<h2>Tags</h2><div class="tags">' + tags + "</div>" : "";
    const publishedDate = d.published_at ? new Date(d.published_at).toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" }) : "unknown";

    panel.innerHTML =
      '<div class="panel">' +
      '<div class="id-row">' +
      '<span class="rai-id">' + d.public_id + "</span>" +
      '<span class="' + sevClass(d.severity) + '">' + d.severity + "</span>" +
      '<span class="status-pill">' + d.status + "</span>" +
      '<span class="type-pill">' + d.incident_type.replace(/_/g, " ") + "</span>" +
      "</div>" +
      "<h1>" + d.title + "</h1>" +
      '<div class="model-line">' + d.affected_model + " · " + d.affected_provider +
      (d.affected_version ? " · " + d.affected_version : "") + " · Published " + publishedDate + "</div>" +
      '<div class="desc">' + d.description + "</div>" +
      evidenceHtml + reproHtml + tagsHtml +
      '<div class="hash-box">Entry hash: ' + d.entry_hash + "<br>Prev hash: " + d.prev_hash + "</div>" +
      "</div>";
  }

  if (!publicId) {
    panel.innerHTML = '<div class="error">No incident ID in the URL.</div>';
    return;
  }

  fetch("/api/incident-db/" + encodeURIComponent(publicId), { cache: "no-store" })
    .then(function (res) {
      if (res.status === 404) throw new Error("No published incident found with this ID.");
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(render)
    .catch(function (err) {
      panel.innerHTML = '<div class="panel"><div class="error">' + String(err.message || err) + "</div></div>";
    });
})();
</script>

</body>
</html>
