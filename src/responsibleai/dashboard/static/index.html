<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResponsibleAI · Governance Dashboard</title>
<link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
<div id="rai-shell"></div>

<script src="/static/js/app.js"></script>
<script>
(function () {
  RAI.shell("overview");
  const content = document.getElementById("rai-page-content");

  const QUICK_LINKS = [
    { href: "/evaluate", label: "Evaluate Model", desc: "Score a model across 6 trust dimensions" },
    { href: "/guardrails", label: "Guardrails", desc: "Scan text for PII and toxicity" },
    { href: "/hallucination", label: "Hallucination", desc: "Check factual consistency" },
    { href: "/cost", label: "Cost Intelligence", desc: "Analyze prompt efficiency" },
    { href: "/router", label: "Model Router", desc: "Route tasks to the right model" },
    { href: "/eval", label: "Compare & Benchmark", desc: "Run benchmark suites" },
    { href: "/redteam", label: "Red Team", desc: "Adversarial prompt testing" },
    { href: "/audit", label: "Audit Log", desc: "Tamper-evident action history" },
    { href: "/leaderboard", label: "Public Leaderboard", desc: "Cross-model trust rankings" },
    { href: "/incident-db", label: "Incident Database", desc: "Crowd-reported AI failures" },
  ];

  function escHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function fmtSeconds(s) {
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (d > 0) return d + "d " + h + "h";
    if (h > 0) return h + "h " + m + "m";
    return m + "m " + Math.floor(s % 60) + "s";
  }

  function render(health, metrics) {
    const healthy = health.status === "healthy";
    content.innerHTML = `
      <div class="page-header">
        <div>
          <h1>Overview</h1>
          <p>Real-time health, cost, and governance metrics for your ResponsibleAI deployment.</p>
        </div>
        <span class="pill ${healthy ? "pill-success" : "pill-critical"}">${healthy ? "Healthy" : "Degraded"} · v${escHtml(health.version)}</span>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="label">Uptime</div>
          <div class="value">${fmtSeconds(health.uptime_seconds)}</div>
        </div>
        <div class="stat-card">
          <div class="label">Total Requests</div>
          <div class="value">${metrics.total_requests.toLocaleString()}</div>
        </div>
        <div class="stat-card">
          <div class="label">Error Rate</div>
          <div class="value">${metrics.error_rate_pct.toFixed(2)}%</div>
          <div class="delta">${metrics.error_count} errors</div>
        </div>
        <div class="stat-card">
          <div class="label">Monthly Spend</div>
          <div class="value">$${metrics.monthly_spend_usd.toLocaleString()}</div>
          <div class="delta">of $${metrics.monthly_budget_usd.toLocaleString()} budget</div>
        </div>
        <div class="stat-card">
          <div class="label">Audit Entries (30d)</div>
          <div class="value">${metrics.audit_entries_30d}</div>
        </div>
        <div class="stat-card">
          <div class="label">Live Connections</div>
          <div class="value" id="ws-count">${metrics.websocket_connections}</div>
          <div class="delta"><span class="spinner" id="ws-spinner" style="width:8px;height:8px;vertical-align:middle;"></span> <span id="ws-label">connecting…</span></div>
        </div>
        <div class="stat-card">
          <div class="label">Webhooks Registered</div>
          <div class="value">${metrics.webhooks_registered}</div>
          <div class="delta">${metrics.webhook_failures} failed deliveries</div>
        </div>
        <div class="stat-card">
          <div class="label">Database</div>
          <div class="value" style="font-size:1.1rem">${escHtml(health.checks.db_backend)}</div>
          <div class="delta">rate limit: ${escHtml(health.checks.rate_limit_backend)}</div>
        </div>
      </div>

      <div class="card">
        <h2 style="margin-top:0;font-size:1.05rem;">Jump to a tool</h2>
        <div class="stat-grid" style="margin-bottom:0;">
          ${QUICK_LINKS.map(function (l) {
            return '<a class="stat-card" style="text-decoration:none;color:inherit;" href="' + l.href + '">' +
              '<div class="label">' + escHtml(l.label) + '</div>' +
              '<div class="text-sm text-muted">' + escHtml(l.desc) + '</div>' +
              '</a>';
          }).join("")}
        </div>
      </div>

      <div class="card">
        <h2 style="margin-top:0;font-size:1.05rem;">Active Modules</h2>
        <div class="flex" style="flex-wrap:wrap;gap:0.5rem;">
          ${health.modules.map(function (m) { return '<span class="pill pill-outline">' + escHtml(m) + "</span>"; }).join("")}
        </div>
      </div>
    `;
  }

  function connectLiveActivity() {
    const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
    let ws;
    try {
      ws = new WebSocket(proto + "//" + window.location.host + "/ws/dashboard");
    } catch (e) {
      return;
    }
    ws.addEventListener("open", function () {
      const label = document.getElementById("ws-label");
      const spinner = document.getElementById("ws-spinner");
      if (label) label.textContent = "live";
      if (spinner) spinner.style.display = "none";
    });
    ws.addEventListener("message", function (evt) {
      try {
        const data = JSON.parse(evt.data);
        if (typeof data.websocket_connections === "number") {
          const el = document.getElementById("ws-count");
          if (el) el.textContent = data.websocket_connections;
        }
      } catch (e) { /* ignore non-JSON pings */ }
    });
    ws.addEventListener("close", function () {
      const label = document.getElementById("ws-label");
      if (label) label.textContent = "disconnected";
    });
    ws.addEventListener("error", function () {
      const label = document.getElementById("ws-label");
      if (label) label.textContent = "unavailable";
    });
  }

  async function load() {
    content.innerHTML = '<div class="state-box"><span class="spinner"></span>&nbsp; Loading dashboard…</div>';
    try {
      const [health, metrics] = await Promise.all([
        RAI.fetchJSON("/api/health", { skipAuthRedirect: true }),
        RAI.fetchJSON("/api/metrics", { skipAuthRedirect: true }),
      ]);
      render(health, metrics);
      connectLiveActivity();
    } catch (e) {
      content.innerHTML = '<div class="state-box error">Could not load dashboard: ' + escHtml(e.message) + "</div>";
    }
  }

  load();
})();
</script>
</body>
</html>
