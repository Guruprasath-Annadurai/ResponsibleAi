name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,openai,anthropic,sso,sentiment]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type-check with mypy
        run: mypy src/responsibleai

      - name: Scan dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          # PYSEC-2026-597: nltk path traversal in nltk.data.load()/find() via
          # percent-encoded "../" sequences. No fix version exists upstream
          # yet. nltk is an opt-in extra ([sentiment]), not installed by a
          # plain `pip install rai-governance-platform` — this CI run
          # installs it explicitly to keep VADER sentiment tests real.
          # Triaged as not exploitable even when installed: this codebase's
          # only nltk call is nltk.download("vader_lexicon", quiet=True), a
          # hardcoded literal resource name; the attack requires
          # attacker-controlled input to that parameter, which never happens
          # in this code path. Re-check when nltk ships a patched release.
          pip-audit --strict --ignore-vuln PYSEC-2026-597

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=src/responsibleai \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Lint Helm chart
        run: helm lint helm/rai-governance/

      - name: Validate Helm template rendering
        run: |
          helm template rai-governance helm/rai-governance/ \
            --set image.tag=ci-test \
            --debug \
            > /dev/null
